<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahid Hossen Fully Auto Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            max-width: 600px; 
            margin: 20px auto; 
        }
        .video-box { 
            background: #111; 
            height: 480px; 
            border: 1px solid #333; 
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
        textarea { width: 90%; height: 60px; margin-top: 10px; background: #222; color: #0f0; border: 1px solid #444; }
        button { padding: 10px 20px; background: #1877f2; color: #fff; border: none; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <h3>ফেসবুক অটো-প্লে প্যানেল</h3>
    <img src="https://uploads.onecompiler.io/44g2943xm/44g33hdxa/1000214709.gif" 
    alt="Description" width="100%" height="1000%">
    <h2>এখানে ভিডিওর লিংক কপি করে বসিয়ে দিন।</h2>
    <textarea id="links" placeholder="এখানে ১০টি লিংক দিন..."></textarea><br>
    <button onclick="start()">ভিডিও লোড করুন</button>

    <div class="grid" id="container"></div>

    <script>
        function start() {
            const input = document.getElementById('links').value;
            const links = input.split('\n').filter(l => l.trim() !== "");
            const container = document.getElementById('container');
            container.innerHTML = "";

            links.slice(0, 10).forEach(link => {
                const url = encodeURIComponent(link.trim());
                // এখানে 'autoplay=1', 'mute=1' এবং 'controls=0' ব্যবহার করা হয়েছে
                const fbSrc = `https://www.facebook.com/plugins/video.php?href=${url}&show_text=false&t=0&autoplay=1&mute=1&loop=1`;
                
                const div = document.createElement('div');
                div.className = 'video-box';
                div.innerHTML = `<iframe src="${fbSrc}" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>`;
                container.appendChild(div);
            });
        }
    </script>

</body>
</html>
