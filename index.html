    <style>
        body { margin: 0; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fff; color: #333; }
        
        /* Top Navigation / Header */
        header { background-color: #002d62; color: #fff; padding: 15px 5%; border-bottom: 4px solid #f9ad1a; }
        .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-top img { height: 50px; }
        
        .nav-links { margin-top: 15px; font-size: 14px; opacity: 0.9; }
        .nav-links span { margin-right: 15px; cursor: pointer; }

        /* Hero Section */
        .hero { background-color: #0055a5; color: #fff; padding: 60px 5%; }
        .hero-content { max-width: 1200px; margin: 0 auto; }
        .hero h1 { font-size: 42px; margin: 0; font-weight: 600; }
        .breadcrumb { font-size: 14px; margin-bottom: 20px; opacity: 0.8; }
        .breadcrumb a { color: #fff; text-decoration: none; }

        /* Main Content Area */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        
        /* Blue Info Alert Box */
        .alert-box { background-color: #3498db; color: #fff; padding: 25px; border-radius: 4px; display: flex; gap: 20px; align-items: flex-start; }
        .alert-box i { font-size: 24px; margin-top: 5px; }
        .alert-box a { color: #fff; text-decoration: underline; font-weight: bold; }

        /* Content List Styles */
        .content-section { margin-top: 20px; border-top: 1px solid #ddd; }
        .list-item { padding: 20px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list-item:hover { background-color: #f9f9f9; }
        .list-item h3 { margin: 0; color: #0055a5; font-size: 20px; }
        .list-item i { color: #666; }

        /* Footer */
        footer { background-color: #001d3d; color: #fff; padding: 60px 5%; margin-top: 100px; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; }
        .footer-links a { color: #fff; text-decoration: none; display: block; margin-bottom: 10px; opacity: 0.8; font-size: 14px; }
        .copyright { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; opacity: 0.6; }

        /* Sticky Help Button */
        .help-btn { position: fixed; bottom: 20px; right: 20px; background-color: #d35400; color: #fff; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
